<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kết Quả Phục Chế - Trọng Hiếu 2</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        /* Căn chỉnh khung chứa các mẫu ảnh */
        .compare-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        /* Định dạng từng ô mẫu ảnh */
        .photo-box { background: white; padding: 15px; border: 1px solid #ddd; border-radius: 10px; width: 45%; min-width: 350px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; }
        .photo-flex { display: flex; gap: 10px; }
        .photo-flex img { width: 50%; border-radius: 5px; object-fit: cover; height: auto; }
        /* Định dạng nút quay lại */
        .back-btn { display: inline-block; margin-top: 30px; padding: 12px 25px; background: #d32f2f; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .back-btn:hover { background: #b71c1c; }
    </style>
</head>
